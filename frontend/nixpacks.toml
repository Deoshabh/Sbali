[phases.setup]
nixPkgs = ["nodejs_20", "bash"]

[phases.install]
cmd = "npm ci --omit=dev --no-audit --no-fund && npm install --no-save --no-audit --no-fund postcss@8.4.49 autoprefixer@10.4.20 tailwindcss@3.4.17"

[phases.build]
cmd = "npm run build && mkdir -p .next/standalone/.next && cp -r .next/static .next/standalone/.next/static && cp -r public .next/standalone/public"

[start]
cmd = "npm start"
